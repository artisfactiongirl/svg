<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .steam {
      fill: none;
      stroke: #A5A5A5;
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0;
      animation: steam-rise 2s infinite ease-in-out;
    }
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 0.6s; }
    .s3 { animation-delay: 1.2s; }

    @keyframes steam-rise {
      0% { transform: translateY(0); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-20px); opacity: 0; }
    }
  </style>
  <!-- Tasse -->
  <path d="M30 45 h40 v25 c0 10 -8 15 -20 15 s-20 -5 -20 -15 v-25" fill="#6F4E37" />
  <path d="M70 50 c8 0 8 10 0 10" fill="none" stroke="#6F4E37" stroke-width="4" />
  <rect x="25" y="85" width="50" height="4" rx="2" fill="#333" />
  <!-- Dampf -->
  <path class="steam s1" d="M40 35 q5 -10 0 -20" />
  <path class="steam s2" d="M50 35 q5 -10 0 -20" />
  <path class="steam s3" d="M60 35 q5 -10 0 -20" />
</svg>
