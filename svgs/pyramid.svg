<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund -->
  <rect width="200" height="200" fill="#000" />

  <!-- Pyramide als Dreieck -->
  <polygon points="100,30 40,160 160,160" fill="none" stroke="#00FFFF" stroke-width="2">
    <!-- Pulsierende Skalierung -->
    <animate attributeName="transform" attributeType="XML" type="scale" 
             values="1;1.2;1" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
  </polygon>

  <!-- Basislinie -->
  <line x1="40" y1="160" x2="160" y2="160" stroke="#333" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" />
  </line>
</svg>   
