<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#222"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#e67e22" stroke-width="2"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#e67e22" stroke-width="2"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#e67e22" stroke-width="2"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#e67e22" stroke-width="2"/>
  <style>
    @keyframes zoom {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    svg {
      transform-origin: 50% 50%;
      animation: zoom 4s ease-in-out infinite;
    }
  </style>
</svg>
