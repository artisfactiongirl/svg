<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund -->
  <rect width="100%" height="100%" fill="#f0f0f0"/>

  <!-- Fibonacci Spirale -->
  <g transform="translate(100,100)">
    <path d="M0,0
             A10,10 0 0,1 10,10
             A20,20 0 0,1 30,30
             A40,40 0 0,1 70,70
             A80,80 0 0,1 150,150"
          stroke="#ff9800" stroke-width="3" fill="none"/>
    <circle cx="0" cy="0" r="5" fill="#ff9800"/>
    <circle cx="10" cy="10" r="5" fill="#ff9800"/>
    <circle cx="30" cy="30" r="5" fill="#ff9800"/>
    <circle cx="70" cy="70" r="5" fill="#ff9800"/>
    <circle cx="150" cy="150" r="5" fill="#ff9800"/>

    <!-- Animieren der Spirale (Rotation) -->
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      from="0 0 0"
                      to="360 0 0"
                      dur="1s"
                      repeatCount="indefinite"/>
  </g>
</svg>

