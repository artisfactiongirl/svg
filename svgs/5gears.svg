<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" style="background: #1a1a1a;">
  <style>
    /* Animation für Drehung im Uhrzeigersinn */
    @keyframes rotate-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Animation für Drehung gegen den Uhrzeigersinn */
    @keyframes rotate-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .gear {
      transform-origin: center;
      transform-box: fill-box;
      animation-duration: 8s;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
    }

    .cw { animation-name: rotate-cw; }
    .ccw { animation-name: rotate-ccw; }

    /* Farben */
    .iron { fill: #bdc3c7; }
    .steel { fill: #95a5a6; }
    .bronze { fill: #d35400; }
  </style>

  <defs>
    <!-- Ein Zahnrad mit 12 Zähnen -->
    <symbol id="gear-mesh" viewBox="0 0 100 100">
      <path d="M50 10 L55 10 L58 2 L67 2 L70 10 L75 10 L82 4 L88 10 L82 17 L86 22 L94 20 L96 29 L88 33 L90 38 L98 42 L98 52 L90 56 L88 61 L96 65 L94 74 L86 72 L82 77 L88 84 L82 90 L75 84 L70 84 L67 92 L58 92 L55 84 L50 84 L45 84 L42 92 L33 92 L30 84 L25 84 L18 90 L12 84 L18 77 L14 72 L6 74 L4 65 L12 61 L10 56 L2 52 L2 42 L10 38 L12 33 L4 29 L6 20 L14 22 L18 17 L12 10 L18 4 L25 10 L30 10 L33 2 L42 2 L45 10 Z" />
      <circle cx="50" cy="50" r="12" fill="#1a1a1a" />
    </symbol>
  </defs>

  <!-- Reihe von 5 Zahnrädern -->
  <!-- Gear 1 -->
  <g transform="translate(50, 50)">
    <use href="#gear-mesh" x="0" y="0" width="100" height="100" class="gear cw iron" />
  </g>

  <!-- Gear 2 (versetzt um 15° für Interlocking) -->
  <g transform="translate(141, 50)">
    <use href="#gear-mesh" x="0" y="0" width="100" height="100" class="gear ccw steel" style="transform: rotate(15deg);" />
  </g>

  <!-- Gear 3 -->
  <g transform="translate(232, 50)">
    <use href="#gear-mesh" x="0" y="0" width="100" height="100" class="gear cw bronze" />
  </g>

  <!-- Gear 4 (versetzt um 15°) -->
  <g transform="translate(323, 50)">
    <use href="#gear-mesh" x="0" y="0" width="100" height="100" class="gear ccw iron" style="transform: rotate(15deg);" />
  </g>

  <!-- Gear 5 -->
  <g transform="translate(414, 50)">
    <use href="#gear-mesh" x="0" y="0" width="100" height="100" class="gear cw steel" />
  </g>
</svg>

