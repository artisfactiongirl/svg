<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .gear {
      fill: #64748b;
      transform-origin: center;
      animation: rotate 4s infinite linear;
    }
    .gear-slow {
      fill: #94a3b8;
      transform-origin: 30px 30px;
      animation: rotate-reverse 6s infinite linear;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotate-reverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
  </style>
  <!-- Großes Zahnrad -->
  <g class="gear" style="transform-box: fill-box;">
    <circle cx="50" cy="50" r="15" />
    <path d="M50 25 L55 10 L45 10 Z M75 50 L90 55 L90 45 Z M50 75 L45 90 L55 90 Z M25 50 L10 45 L10 55 Z" />
    <path d="M32 32 L22 22 L28 18 Z M68 32 L78 22 L82 28 Z M68 68 L78 78 L72 82 Z M32 68 L22 78 L18 72 Z" transform="rotate(22.5 50 50)" />
  </g>
  <!-- Kleines Zahnrad oben links -->
  <g class="gear-slow" style="transform-box: fill-box;">
    <circle cx="30" cy="30" r="10" />
    <path d="M30 15 L33 5 L27 5 Z M45 30 L55 33 L55 27 Z M30 45 L27 55 L33 55 Z M15 30 L5 27 L5 33 Z" transform="scale(0.8) translate(7, 7)" />
  </g>
</svg>
