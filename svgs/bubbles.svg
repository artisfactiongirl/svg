
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bubble {
      fill: #38bdf8;
      opacity: 0;
      animation: rise 3s infinite ease-in;
    }
    .b1 { animation-delay: 0s; }
    .b2 { animation-delay: 1s; }
    .b3 { animation-delay: 2s; }
    
    @keyframes rise {
      0% { transform: translateY(80px) scale(0.5); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: translateY(0px) scale(1.2); opacity: 0; }
    }
  </style>
  <circle class="bubble b1" cx="30" cy="10" r="8" />
  <circle class="bubble b2" cx="70" cy="10" r="12" />
  <circle class="bubble b3" cx="50" cy="10" r="10" />
</svg>
