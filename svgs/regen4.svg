  <style
     id="style2">
    .background {
      fill: #050508;
    }

    .drop {
      stroke: #a0c4ff;
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0.6;
      filter: url(#glow);
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(700px) translateX(-20px);
        opacity: 0;
      }
    }

    /* Variationen für Geschwindigkeit und Position */
    .d1 { animation-duration: 0.8s; animation-delay: 0s; }
    .d2 { animation-duration: 1.2s; animation-delay: 0.2s; }
    .d3 { animation-duration: 1.0s; animation-delay: 0.5s; }
    .d4 { animation-duration: 0.7s; animation-delay: 0.3s; }
    .d5 { animation-duration: 1.5s; animation-delay: 0.1s; }
  </style>
