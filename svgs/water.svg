<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .wave {
      animation: wave-move 3s infinite linear;
      fill: #38bdf8;
      opacity: 0.6;
    }
    .wave-back {
      animation: wave-move 5s infinite linear reverse;
      fill: #0ea5e9;
      opacity: 0.4;
    }
    @keyframes wave-move {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50px); }
    }
  </style>
  <path class="wave-back" d="M0 50 Q25 40 50 50 T100 50 T150 50 T200 50 V100 H0 Z" />
  <path class="wave" d="M0 60 Q25 50 50 60 T100 60 T150 60 T200 60 V100 H0 Z" />
</svg>
