<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .vine {
      fill: none;
      stroke: #D4AF37;
      stroke-width: 1.5;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw-vine 5s infinite alternate ease-in-out;
    }
    @keyframes draw-vine {
      to { stroke-dashoffset: 0; }
    }
    .bloom {
      fill: #E57373;
      transform-origin: center;
      animation: bloom-pulse 4s infinite alternate ease-in-out;
    }
    @keyframes bloom-pulse {
      from { transform: scale(0.8); opacity: 0.6; }
      to { transform: scale(1.1); opacity: 1; }
    }
  </style>
  <path class="vine" d="M50 90 C 20 70, 80 50, 50 10 C 20 50, 80 70, 50 90" />
  <circle class="bloom" cx="50" cy="50" r="10" />
  <path class="vine" d="M10 50 Q 50 50 90 50" />
</svg>
