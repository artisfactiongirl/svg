
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .vine {
      fill: none;
      stroke: #d4af37; /* Gold */
      stroke-width: 2;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw 4s infinite alternate ease-in-out;
    }
    .flower {
      fill: #f472b6;
      transform-origin: center;
      animation: bloom 4s infinite alternate ease-in-out;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes bloom {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1.2); opacity: 1; }
    }
  </style>
  <path class="vine" d="M50 90 Q30 70 50 50 T50 10" />
  <path class="vine" d="M50 90 Q70 70 50 50 T50 10" />
  <circle class="flower" cx="50" cy="25" r="8" />
</svg>
