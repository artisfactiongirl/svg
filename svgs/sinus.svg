<svg width="100" height="100" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
  <style>
    .wave {
      fill: none;
      stroke: #10b981;
      stroke-width: 2;
      stroke-linecap: round;
      animation: drift 2s infinite linear;
    }
    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(-40px); }
    }
  </style>
  <path class="wave" d="M0 20 Q 10 0, 20 20 T 40 20 T 60 20 T 80 20 T 100 20 T 120 20 T 140 20" />
</svg>
