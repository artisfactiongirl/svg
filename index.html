<!DOCTYPE html>

    <title>SVG Collection</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; }
        
        /* Container für die geladene SVG */
        .svg-wrapper {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        /* Styling für die eingebundenen Bilder */
        .svg-wrapper img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
