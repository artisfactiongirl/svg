<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Collection Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .gallery { display: flex; flex-wrap: wrap; }
        .gallery-item { margin: 10px; text-align: center; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>SVG Collection Gallery</h1>
    <div class="gallery">
        <!-- SVG items will be added here -->
        <div class="gallery-item">
            <h2>Item 1</h2>
            <img src="path/to/your/svg1.svg" alt="SVG 1">
        </div>
        <div class="gallery-item">
            <h2>Item 2</h2>
            <img src="path/to/your/svg2.svg" alt="SVG 2">
        </div>
        <div class="gallery-item">
            <h2>Item 3</h2>
            <img src="path/to/your/svg3.svg" alt="SVG 3">
        </div>
        <!-- Add more items as needed -->
    </div>
</body>
</html>
